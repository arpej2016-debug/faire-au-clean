<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
  /* ── EmailJS : notification de visite avec géolocalisation ── */
  (function() {
    emailjs.init({ publicKey: 'ne6ukOmGH9fzAqGuZ' });

    const now      = new Date();
    const dateStr  = now.toLocaleDateString('fr-FR', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
    const timeStr  = now.toLocaleTimeString('fr-FR');
    const lang     = navigator.language || 'Inconnu';
    const ua       = navigator.userAgent;

    let device = 'Desktop';
    if (/Mobi|Android/i.test(ua)) device = 'Mobile';
    else if (/Tablet|iPad/i.test(ua)) device = 'Tablette';

    // Anti spam (1 envoi par session)
    if (!sessionStorage.getItem('visit_notified')) {
      sessionStorage.setItem('visit_notified', '1');

      // 👉 Géolocalisation IP
      fetch('https://ipapi.co/json/')
        .then(r => r.json())
        .then(geo => {
          const ville = geo.city || 'Inconnue';
          const pays  = geo.country_name || '';
          const ip    = geo.ip || '';

          return emailjs.send('service_faireauclean', 'template_thtdq6a', {
            to_email : 'arpej2016@gmail.com',
            date     : dateStr,
            heure    : timeStr,
            langue   : lang,
            device   : device,
            page     : window.location.href,
            ville    : ville,
            pays     : pays,
            ip       : ip
          });
        })
        .catch(() => {
          // fallback si API HS
          return emailjs.send('service_faireauclean', 'template_thtdq6a', {
            to_email : 'arpej2016@gmail.com',
            date     : dateStr,
            heure    : timeStr,
            langue   : lang,
            device   : device,
            page     : window.location.href,
            ville    : 'Non détectée',
            pays     : '',
            ip       : ''
          });
        })
        .catch(() => {
          // silencieux si EmailJS échoue
        });
    }
  })();

  /* ── Hamburger menu ── */
  function toggleMenu() {
    document.getElementById('mobileMenu').classList.toggle('open');
  }
  function closeMenu() {
    document.getElementById('mobileMenu').classList.remove('open');
  }

  document.addEventListener('click', function(e) {
    const menu = document.getElementById('mobileMenu');
    const btn  = document.getElementById('hamburger');
    if (!menu.contains(e.target) && !btn.contains(e.target)) {
      menu.classList.remove('open');
    }
  });

  /* ── Formulaire mailto ── */
  function sendForm() {
    const prenom  = document.getElementById('prenom').value.trim();
    const nom     = document.getElementById('nom').value.trim();
    const tel     = document.getElementById('tel').value.trim();
    const email   = document.getElementById('email').value.trim();
    const service = document.getElementById('service').value;
    const message = document.getElementById('message').value.trim();

    if (!prenom || !tel || !service) {
      alert('Merci de renseigner au minimum votre prénom, téléphone et le type de service.');
      return;
    }

    const sujet = `Demande de devis – ${service}`;
    const corps =
      `Nom : ${prenom} ${nom}\n` +
      `Téléphone : ${tel}\n` +
      `Email : ${email}\n` +
      `Service souhaité : ${service}\n\n` +
      `Message :\n${message}`;

    window.location.href =
      `mailto:fa.clean@orange.fr?subject=${encodeURIComponent(sujet)}&body=${encodeURIComponent(corps)}`;

    document.getElementById('formSuccess').style.display = 'block';
  }

  /* ── Scroll fade-in ── */
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.08 });

  document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
</script>
